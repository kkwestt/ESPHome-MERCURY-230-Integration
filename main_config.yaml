preferences:
  flash_write_interval: 5min

api:
  reboot_timeout: 12h # не ребутиться, если HA недоступен
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_key

safe_mode:
  reboot_timeout: 60min
  num_attempts: 5

wifi:
  id: wifi_id
  min_auth_mode: WPA2
  # Allow rapid re-connection to previously connect WiFi SSID, skipping scan of all SSID
  fast_connect: false
  # Define dns domain / suffix to add to hostname
  domain: ".local"

  power_save_mode: none
  output_power: 19.5dBm

  networks:
    - ssid: !secret wifi_ssid
      password: !secret wifi_password 

  ap:
    ssid: "$friendly_name AP"

logger:
  level: error

web_server:
  port: 80
  version: 3
  log: false
  local: true

captive_portal:

sensor:
  - platform: wifi_signal
    name: "RSSI"
    id: sensor_rssi
    update_interval: 60s
    entity_category: "diagnostic"
    icon: "mdi:wifi"

  - platform: uptime
    id: sensor_uptime
    update_interval: 10s
    internal: true
    entity_category: "diagnostic"
    icon: "mdi:timer-outline"

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      icon: mdi:ip-network
      entity_category: diagnostic
    ssid:
      name: "Connected SSID"
      icon: mdi:wifi-strength-2
      entity_category: diagnostic
    mac_address:
      name: "Mac Address"
      icon: mdi:network-pos
      entity_category: diagnostic

  #  Creates a sensor of the uptime of the device, in formatted days, hours, minutes and seconds
  - platform: template
    name: "Uptime"
    id: uptime_text_sensor
    entity_category: diagnostic
    update_interval: 10s
    lambda: |-
      int seconds = id(sensor_uptime).state;
      if (seconds > 31536000) {
        return {"Starting up"};
      }
      int days = seconds / 86400;
      seconds = seconds % 86400;
      int hours = seconds / 3600;
      seconds = seconds % 3600;
      int minutes = seconds / 60;
      seconds = seconds % 60;

      char buffer[64];
      if (days > 0) {
        snprintf(buffer, sizeof(buffer), "%dd %dh %dm %ds", days, hours, minutes, seconds);
      } else if (hours > 0) {
        snprintf(buffer, sizeof(buffer), "%dh %dm %ds", hours, minutes, seconds);
      } else if (minutes > 0) {
        snprintf(buffer, sizeof(buffer), "%dm %ds", minutes, seconds);
      } else {
        snprintf(buffer, sizeof(buffer), "%ds", seconds);
      }
      return {std::string(buffer)};
    icon: "mdi:timer-outline"

binary_sensor:
  - platform: template
    name: Wifi Connection
    entity_category: "diagnostic"
    disabled_by_default: true
    id: wifi_connected
    icon: "mdi:check-network"
    lambda: return id(wifi_id).is_connected();
    on_press:
      then:
        - light.turn_off: led
    on_release:
      then:
        - light.turn_on: led

button:
  - platform: restart
    name: "Restart"
    entity_category: config

  - platform: factory_reset
    name: "Factory Reset"
    id: Reset
    entity_category: config

  - platform: safe_mode
    name: "Safe Mode"
    internal: false
    entity_category: config
